services:
  app:
    build:
      context: .
      args:
        # Đọc từ file .env cùng thư mục (KHÔNG commit lên git)
        VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY}
        VITE_GEMINI_MODEL: ${VITE_GEMINI_MODEL:-gemini-3.5-flash}
    ports:
      # Cổng host đổi được qua biến APP_PORT trong .env (mặc định 3100 để tránh đụng web khác).
      # Bên trong container luôn là 3000.
      - "${APP_PORT:-3100}:3000"
    environment:
      - DATA_FILE=/app/data/books.json
    volumes:
      - book-data:/app/data     # giữ dữ liệu sách qua các lần rebuild
    restart: unless-stopped

volumes:
  book-data:
