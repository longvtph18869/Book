# Reverse proxy cho app (chạy Docker ở cổng 3100) ra domain book.vutienlong.vn
# Đặt file này ở /etc/nginx/sites-available/ (Ubuntu/Debian) hoặc /etc/nginx/conf.d/
# Sau khi chạy certbot --nginx, certbot sẽ tự thêm block 443 + redirect HTTPS.

server {
    listen 80;
    listen [::]:80;
    server_name book.vutienlong.vn;

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;   # để lâu vì gọi Gemini có thể mất thời gian
    }
}
